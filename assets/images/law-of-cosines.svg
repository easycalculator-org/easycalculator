<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>

    <!-- Triangle -->
    <linearGradient id="tri" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="20" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle"
        font-size="30" font-weight="800" fill="#0f172a">
    Law of Cosines
  </text>

  <!-- Triangle -->
  <polygon points="200,300 600,300 400,120"
           fill="url(#tri)"
           stroke="#2563eb"
           stroke-width="3"
           filter="url(#shadow)"/>

  <!-- Points -->
  <circle cx="200" cy="300" r="7" fill="#ef4444"/>
  <circle cx="600" cy="300" r="7" fill="#10b981"/>
  <circle cx="400" cy="120" r="7" fill="#f59e0b"/>

  <!-- Vertex Labels (BIGGER & BOLD) -->
  <text x="180" y="330" font-size="18" font-weight="800" fill="#ef4444">A</text>
  <text x="610" y="330" font-size="18" font-weight="800" fill="#10b981">B</text>
  <text x="395" y="100" font-size="18" font-weight="800" fill="#f59e0b">C</text>

  <!-- Side Labels (BIGGER & BOLD) -->
  <text x="390" y="325" font-size="18" font-weight="800" fill="#0f172a">c</text>
  <text x="300" y="200" font-size="18" font-weight="800" fill="#0f172a">b</text>
  <text x="500" y="200" font-size="18" font-weight="800" fill="#0f172a">a</text>

  <!-- FIXED Angle Arc at C -->
  <path d="M400 120 
           L360 160 
           A60 60 0 0 1 440 160 
           Z"
        fill="rgba(245,158,11,0.2)"/>

  <!-- Angle Border -->
  <path d="M360 160 
           A60 60 10 220 19 440 160"
        fill="none"
        stroke="#f59e0b"
        stroke-width="5"/>

  <!-- Angle Label -->
  <text x="400" y="165" text-anchor="middle"
        font-size="18"
        font-weight="800"
        fill="#f59e0b">
    ∠C
  </text>

  <!-- Formula Card -->
  <rect x="200" y="340" width="400" height="55" rx="14"
        fill="#ffffff"
        stroke="#c7d2fe"
        filter="url(#shadow)"/>

  <!-- Formula -->
  <text x="400" y="375" text-anchor="middle"
        font-size="22"
        font-weight="900"
        fill="#1e3a8a">
    c² = a² + b² − 2ab cos(C)
  </text>

</svg>