<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for signal -->
    <linearGradient id="waveGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#90caf9"/>
      <stop offset="50%" stop-color="#2196f3"/>
      <stop offset="100%" stop-color="#90caf9"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <style>
    .title { font: bold 34px Arial; fill: #1f3b64; letter-spacing: 1px; }
    .subtitle { font: bold 24px Arial; fill: #4a90e2; }
    .text { font: 16px Arial; fill: #333; }
    .formula { font: 22px Arial; fill: #1f3b64; }
    .label { font: 14px Arial; fill: #666; }
    .line { stroke: #4a90e2; stroke-width: 2; }
  </style>

  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" class="title">
    FREE SPACE PATH LOSS
  </text>
  <text x="450" y="90" text-anchor="middle" class="subtitle">
    CALCULATOR
  </text>

  <!-- TX Tower -->
  <g transform="translate(100,130)">
    <line x1="0" y1="200" x2="40" y2="0" class="line"/>
    <line x1="80" y1="200" x2="40" y2="0" class="line"/>
    <line x1="0" y1="200" x2="80" y2="200" class="line"/>
    <text x="40" y="-10" text-anchor="middle" class="text">TX</text>
  </g>

  <!-- RX -->
  <g transform="translate(750,210)">
    <rect x="-10" y="20" width="20" height="40" fill="#4a90e2" rx="4"/>
    <line x1="0" y1="0" x2="0" y2="20" class="line"/>
    <text x="0" y="-10" text-anchor="middle" class="text">RX</text>
  </g>

  <!-- RF Signal Wave -->
  <path d="
    M180 280
    Q200 250 220 280
    T260 280
    T300 280
    T340 280
    T380 280
    T420 280
    T460 280
    T500 280
    T540 280
    T580 280
    T620 280
    T660 280
    T700 280
    T740 280
  " stroke="url(#waveGrad)" stroke-width="4" fill="none"/>

  <!-- Distance Arrow -->
  <line x1="180" y1="180" x2="740" y2="180" class="line"/>
  <polygon points="740,180 730,175 730,185" fill="#4a90e2"/>
  <text x="460" y="165" text-anchor="middle" class="text">
    Distance (d km)
  </text>

  <!-- Formula Box -->
  <g filter="url(#shadow)">
    <rect x="150" y="330" width="600" height="110" rx="16" fill="#ffffff" stroke="#dbe6f3"/>
  </g>

  <text x="450" y="370" text-anchor="middle" class="formula">
    FSPL(dB) = 32.44 + 20 log₁₀(d) + 20 log₁₀(f)
  </text>

  <text x="300" y="405" class="label">
    d = Distance (km)
  </text>
  <text x="520" y="405" class="label">
    f = Frequency (MHz)
  </text>

  <!-- Bottom Tags (NOW WITH PROPER GAP) -->
  <g transform="translate(200,480)">
    <rect x="0" y="-25" width="500" height="45" rx="25" fill="#eef4fb"/>
    <text x="250" y="5" text-anchor="middle" class="text" fill="#4a90e2">
      LTE  |  5G  |  Microwave  |  Satellite
    </text>
  </g>

</svg>