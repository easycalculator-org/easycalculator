<svg width="700" height="520" viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Title -->
  <text x="350" y="45" text-anchor="middle" font-size="24" font-weight="bold">
    Haversine Distance Formula
  </text>

  <!-- Earth (moved slightly up) -->
  <circle cx="350" cy="230" r="150" fill="#e3f2fd" stroke="#1976d2" stroke-width="3"/>

  <!-- Grid lines -->
  <ellipse cx="350" cy="230" rx="150" ry="60" fill="none" stroke="#90caf9" stroke-width="1"/>
  <ellipse cx="350" cy="230" rx="150" ry="100" fill="none" stroke="#90caf9" stroke-width="1"/>
  <line x1="350" y1="80" x2="350" y2="380" stroke="#90caf9" stroke-width="1"/>
  <line x1="200" y1="230" x2="500" y2="230" stroke="#90caf9" stroke-width="1"/>

  <!-- Point A -->
  <circle cx="260" cy="150" r="6" fill="#e53935"/>
  <text x="180" y="140" font-size="14">A (φ₁, λ₁)</text>

  <!-- Point B -->
  <circle cx="440" cy="300" r="6" fill="#43a047"/>
  <text x="450" y="320" font-size="14">B (φ₂, λ₂)</text>

  <!-- Curve -->
  <path d="M260 150 Q350 40 440 300"
        fill="none"
        stroke="#fb8c00"
        stroke-width="3"
        stroke-dasharray="6,4"/>

  <!-- Distance label -->
  <text x="350" y="70" text-anchor="middle" font-size="15" fill="#fb8c00">
    Great-circle distance (d)
  </text>

  <!-- Radius -->
  <line x1="350" y1="230" x2="350" y2="80" stroke="#616161" stroke-width="2"/>
  <text x="360" y="160" font-size="13">R</text>

  <!-- Formula Box (moved down for clear gap) -->
  <rect x="80" y="420" width="540" height="80" rx="10" ry="10"
        fill="#ffcc99 " stroke="#cccccc"/>

  <!-- Formula Text -->
  <text x="350" y="445" text-anchor="middle" font-size="14">
    d = 2R · asin( √[ sin²(Δφ/2) + cos(φ₁)·cos(φ₂)·sin²(Δλ/2) ] )
  </text>

  <text x="350" y="468" text-anchor="middle" font-size="12" fill="#555">
    Δφ = φ₂ - φ₁,   Δλ = λ₂ - λ₁,   R ≈ 6371 km
  </text>

</svg>