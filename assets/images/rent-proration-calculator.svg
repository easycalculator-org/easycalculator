<svg width="100%" height="340" viewBox="0 0 950 340" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect width="950" height="340" fill="#f8fbff"/>

<!-- Title -->
<text x="475" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0d6efd">
Rent Proration Calculator Example
</text>

<!-- HOUSE (LEFT) -->
<g transform="translate(60,110)">
  <polygon points="60,0 120,50 0,50" fill="#0d6efd"/>
  <rect x="20" y="50" width="80" height="70" fill="#ffffff" stroke="#dee2e6"/>
  <rect x="55" y="80" width="20" height="40" fill="#0d6efd"/>
</g>

<!-- INPUT BOXES (SPACED) -->
<rect x="220" y="90" width="140" height="90" rx="12" fill="#ffffff" stroke="#dee2e6"/>
<text x="290" y="115" text-anchor="middle" font-size="13">Rent</text>
<text x="290" y="145" text-anchor="middle" font-size="18" font-weight="700" fill="#0d6efd">2000</text>

<rect x="380" y="90" width="140" height="90" rx="12" fill="#ffffff" stroke="#dee2e6"/>
<text x="450" y="115" text-anchor="middle" font-size="13">Days</text>
<text x="450" y="145" text-anchor="middle" font-size="18" font-weight="700" fill="#0d6efd">30</text>

<rect x="540" y="90" width="140" height="90" rx="12" fill="#ffffff" stroke="#dee2e6"/>
<text x="610" y="115" text-anchor="middle" font-size="13">Stay</text>
<text x="610" y="145" text-anchor="middle" font-size="18" font-weight="700" fill="#0d6efd">10</text>

<!-- CALCULATOR (CENTER FOCUS) -->
<g transform="translate(720,80)">
  <rect width="140" height="180" rx="14" fill="#ffffff" stroke="#dee2e6"/>
  
  <!-- display -->
  <rect x="20" y="15" width="100" height="30" fill="#e9f2ff"/>
  
  <!-- buttons -->
  <circle cx="40" cy="70" r="8" fill="#0d6efd"/>
  <circle cx="70" cy="70" r="8" fill="#0d6efd"/>
  <circle cx="100" cy="70" r="8" fill="#0d6efd"/>
  
  <circle cx="40" cy="100" r="8" fill="#0d6efd"/>
  <circle cx="70" cy="100" r="8" fill="#0d6efd"/>
  <circle cx="100" cy="100" r="8" fill="#0d6efd"/>
  
  <circle cx="70" cy="140" r="10" fill="#198754"/>
</g>

<!-- ARROWS (SPACED FLOW) -->
<line x1="180" y1="135" x2="220" y2="135" stroke="#0d6efd" stroke-width="2"/>
<line x1="360" y1="135" x2="380" y2="135" stroke="#0d6efd" stroke-width="2"/>
<line x1="520" y1="135" x2="540" y2="135" stroke="#0d6efd" stroke-width="2"/>
<line x1="680" y1="135" x2="720" y2="135" stroke="#0d6efd" stroke-width="2"/>

<!-- FORMULA -->
<text x="475" y="240" text-anchor="middle" font-size="15" fill="#333">
Daily Rent = 2000 ÷ 30 = 66.67
</text>

<text x="475" y="280" text-anchor="middle" font-size="18" font-weight="700" fill="#198754">
Prorated Rent = 66.67 × 10 = 666.70
</text>

</svg>