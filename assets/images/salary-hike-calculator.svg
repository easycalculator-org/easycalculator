<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">

  <!-- Light Background -->
  <rect width="800" height="520" rx="20" fill="#fafcff"/>

  <!-- Title -->
  <text x="50%" y="60" text-anchor="middle" font-size="28" font-weight="bold" fill="#2c3e50">
    Salary Hike Calculator
  </text>

  <!-- Left Card -->
  <rect x="80" y="120" width="280" height="280" rx="15" fill="#ffffff" stroke="#e6ecf2"/>

  <!-- Inputs -->
  <text x="100" y="160" font-size="16" fill="#555">Current Monthly Salary</text>
  <rect x="100" y="170" width="240" height="35" rx="8" fill="#f4f7fb"/>
  <text x="110" y="193" font-size="14" fill="#888">50,000</text>

  <text x="100" y="230" font-size="16" fill="#555">Hike (%)</text>
  <rect x="100" y="240" width="240" height="35" rx="8" fill="#f4f7fb"/>
  <text x="110" y="263" font-size="14" fill="#888">10%</text>

  <!-- Button -->
  <rect x="100" y="310" width="240" height="42" rx="10" fill="#4CAF50"/>
  <text x="220" y="336" text-anchor="middle" font-size="16" fill="#fff">Calculate</text>

  <!-- Right Card -->
  <rect x="440" y="120" width="280" height="280" rx="15" fill="#ffffff" stroke="#e6ecf2"/>

  <!-- Arrow -->
  <line x1="360" y1="260" x2="440" y2="260" stroke="#4CAF50" stroke-width="4"/>
  <polygon points="440,260 425,250 425,270" fill="#4CAF50"/>

  <!-- Results -->
  <text x="580" y="170" text-anchor="middle" font-size="16" fill="#555">
    New Monthly Salary
  </text>

  <text x="580" y="205" text-anchor="middle" font-size="26" font-weight="bold" fill="#2c3e50">
    55,000
  </text>

  <text x="580" y="245" text-anchor="middle" font-size="14" fill="#777">
    Monthly Increase: 5,000
  </text>

  <text x="580" y="285" text-anchor="middle" font-size="14" fill="#777">
    Yearly Package: 6,60,000
  </text>

  <!-- Growth Chart -->
  <polyline points="500,350 540,320 580,335 620,300" 
            fill="none" stroke="#4CAF50" stroke-width="3"/>
  <circle cx="500" cy="350" r="4" fill="#4CAF50"/>
  <circle cx="540" cy="320" r="4" fill="#4CAF50"/>
  <circle cx="580" cy="335" r="4" fill="#4CAF50"/>
  <circle cx="620" cy="300" r="4" fill="#4CAF50"/>

</svg>