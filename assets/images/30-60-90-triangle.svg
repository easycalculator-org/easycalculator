<svg width="100%" height="100%" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="500" height="400" rx="20" fill="#f4f8ff"/>

  <!-- Triangle -->
  <polygon points="100,320 400,320 100,80"
           fill="#e3edff"
           stroke="#2b6cff"
           stroke-width="3"/>

  <!-- Right Angle Box -->
  <rect x="100" y="300" width="20" height="20" fill="#2b6cff"/>

  <!-- Labels -->
  <text x="230" y="350" font-size="18" fill="#333" font-weight="600">
    Base = x
  </text>

  <text x="60" y="210" font-size="18" fill="#333" font-weight="600" transform="rotate(-90 60,210)">
    Height = x√3
  </text>

  <text x="240" y="180" font-size="18" fill="#2b6cff" font-weight="700">
    Hypotenuse = 2x
  </text>

  <!-- Angle Labels -->
  <text x="95" y="340" font-size="16" fill="#000">90°</text>
  <text x="340" y="310" font-size="16" fill="#000">30°</text>
  <text x="106" y="120" font-size="16" fill="#000">60°</text>

  <!-- Title -->
  <text x="250" y="40" text-anchor="middle" font-size="22" fill="#2b6cff" font-weight="700">
    30° - 60° - 90° Triangle calculator
  </text>

</svg>