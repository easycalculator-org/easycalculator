<svg width="900" height="540" viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg">

  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="resultGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Header -->
  <rect x="50" y="20" width="800" height="55" rx="12" fill="url(#headerGrad)"/>
  <text x="450" y="55" text-anchor="middle" font-size="22" fill="#fff" font-weight="bold">
    Age Calculator
  </text>

  <!-- Input Card -->
  <rect x="60" y="100" width="360" height="200" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="drop-shadow(0 4px 8px rgba(0,0,0,0.05))"/>

  <text x="240" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">
    Input Dates
  </text>

  <!-- DOB -->
  <text x="90" y="175" font-size="14" fill="#475569">Date of Birth:</text>
  <rect x="220" y="160" width="45" height="32" rx="6" fill="#eef2ff"/>
  <rect x="275" y="160" width="45" height="32" rx="6" fill="#eef2ff"/>
  <rect x="330" y="160" width="75" height="32" rx="6" fill="#eef2ff"/>

  <text x="242" y="182" text-anchor="middle">7</text>
  <text x="297" y="182" text-anchor="middle">22</text>
  <text x="367" y="182" text-anchor="middle">1998</text>

  <!-- Current -->
  <text x="90" y="235" font-size="14" fill="#475569">Current Date:</text>
  <rect x="220" y="220" width="45" height="32" rx="6" fill="#eef2ff"/>
  <rect x="275" y="220" width="45" height="32" rx="6" fill="#eef2ff"/>
  <rect x="330" y="220" width="75" height="32" rx="6" fill="#eef2ff"/>

  <text x="242" y="242" text-anchor="middle">4</text>
  <text x="297" y="242" text-anchor="middle">16</text>
  <text x="367" y="242" text-anchor="middle">2025</text>

  <!-- Arrow -->
  <line x1="430" y1="200" x2="510" y2="200" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Result Card -->
  <rect x="520" y="100" width="320" height="200" rx="14" fill="url(#resultGrad)" filter="drop-shadow(0 6px 12px rgba(0,0,0,0.1))"/>

  <text x="680" y="140" text-anchor="middle" font-size="16" fill="#dcfce7" font-weight="bold">
    Result
  </text>

  <text x="680" y="190" text-anchor="middle" font-size="28" fill="#ffffff" font-weight="bold">
    26 Years
  </text>

  <text x="680" y="220" text-anchor="middle" font-size="16" fill="#dcfce7">
    8 Months 25 Days
  </text>

  <!-- Formula Section -->
  <rect x="60" y="330" width="780" height="190" rx="14" fill="#ffffff" stroke="#e2e8f0"/>

  <text x="450" y="360" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">
    Age Calculation Formula
  </text>

  <text x="450" y="385" text-anchor="middle" font-size="14" fill="#334155">
    Age = Current Date − Date of Birth
  </text>

  <text x="450" y="410" text-anchor="middle" font-size="13" fill="#475569">
    Years = Y₂ − Y₁, Months = M₂ − M₁, Days = D₂ − D₁
  </text>

  <text x="450" y="435" text-anchor="middle" font-size="13" fill="#ef4444">
    If Days negative → Borrow 1 month
  </text>

  <text x="450" y="455" text-anchor="middle" font-size="13" fill="#ef4444">
    If Months negative → Borrow 1 year
  </text>

  <text x="450" y="480" text-anchor="middle" font-size="13" fill="#1e293b">
    Example: 22/07/1998 → 16/04/2025 = 26 Years, 8 Months, 25 Days
  </text>

</svg>