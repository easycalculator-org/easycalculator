<svg width="100%" height="100%" viewBox="0 0 1100 650" xmlns="http://www.w3.org/2000/svg">

  <!-- ===== Background ===== -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7b267"/>
      <stop offset="100%" stop-color="#f79d65"/>
    </linearGradient>

    <linearGradient id="towerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c757d"/>
      <stop offset="100%" stop-color="#343a40"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="650" fill="url(#bg)"/>

  <!-- ===== Title ===== -->
  <text x="50%" y="60" text-anchor="middle"
        font-size="44" font-weight="700"
        fill="#1f4e79" font-family="Arial">
    EIRP Calculator
  </text>

  <!-- ===== Main Card ===== -->
  <rect x="40" y="90" width="1020" height="420" rx="20" fill="#ffffff"/>

  <!-- ===== Inputs Section ===== -->
  <rect x="90" y="220" width="120" height="90" rx="12"
        fill="#e7f1ff" stroke="#0d6efd" stroke-width="2"/>
  <text x="150" y="250" text-anchor="middle" font-size="14" fill="#0d6efd">Tx Power</text>
  <text x="150" y="280" text-anchor="middle" font-size="18" font-weight="700" fill="#0d6efd">30 dBm</text>

  <line x1="210" y1="265" x2="340" y2="265" stroke="#dc3545" stroke-width="6"/>

  <text x="275" y="230" text-anchor="middle" font-size="14" fill="#dc3545">Cable Loss</text>
  <text x="275" y="210" text-anchor="middle" font-size="14" fill="#dc3545">2 dB</text>

  <!-- ===== 5G Tower ===== -->
  <polygon points="420,400 470,150 520,400"
           fill="url(#towerGrad)" stroke="#222" stroke-width="2"/>

  <!-- Cross bars -->
  <line x1="445" y1="320" x2="495" y2="320" stroke="#aaa"/>
  <line x1="435" y1="270" x2="505" y2="270" stroke="#aaa"/>
  <line x1="425" y1="220" x2="515" y2="220" stroke="#aaa"/>

  <!-- Antenna Panels -->
  <rect x="510" y="150" width="14" height="60" fill="#198754"/>
  <rect x="525" y="155" width="7" height="55" fill="#145c32"/>

  <text x="480" y="430" text-anchor="middle" font-size="14" fill="#198754">
    Antenna Gain (15 dBi)
  </text>

  <!-- ===== Directional Pattern ===== -->
  <ellipse cx="800" cy="250" rx="180" ry="80"
           fill="none" stroke="#6f42c1" stroke-width="3"/>

  <!-- Gain Arrow -->
  <line x1="800" y1="250" x2="1000" y2="250" stroke="#198754" stroke-width="3"/>
  <polygon points="1005,250 995,245 995,255" fill="#198754"/>

  <text x="880" y="230" font-size="14" fill="#198754">
    Directional Gain (dBi)
  </text>

  <!-- ===== RESULT ===== -->
  <rect x="400" y="450" width="300" height="90" rx="15"
        fill="#e7f1ff" stroke="#0d6efd"/>

  <text x="550" y="480" text-anchor="middle" font-size="18">EIRP Result</text>

  <text x="550" y="510" text-anchor="middle"
        font-size="26" font-weight="700" fill="#0d6efd">
    43 dBm
  </text>

  <text x="550" y="535" text-anchor="middle" font-size="16" fill="#666">
    19.95 Watts
  </text>

  <!-- ===== FULL FORMULA BOX ===== -->
  <rect x="80" y="560" width="940" height="80" rx="12"
        fill="#ffffff" stroke="#ccc"/>

  <text x="100" y="590" font-size="16" fill="#333">
    EIRP (dBm) = Tx Power (dBm) + Antenna Gain (dBi) − Cable Loss (dB)
  </text>

  <text x="100" y="615" font-size="16" fill="#333">
    EIRP (Watts) = 10^((EIRP(dBm) − 30) / 10)
  </text>

  <text x="100" y="635" font-size="16" fill="#333">
    Linear Form: EIRP = Tx Power × Antenna Gain ÷ Cable Loss
  </text>

</svg>