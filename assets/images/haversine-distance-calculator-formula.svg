<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#eef5ff"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold">
    THE HAVERSINE FORMULA
  </text>

  <text x="400" y="60" text-anchor="middle" font-size="14">
    Finding shortest distance between two points on a sphere
  </text>

  <!-- Earth -->
  <circle cx="250" cy="280" r="150" fill="#d6ecff" stroke="#1976d2" stroke-width="3"/>

  <!-- Points -->
  <circle cx="180" cy="210" r="6" fill="red"/>
  <text x="140" y="200" font-size="13">Point A</text>

  <circle cx="330" cy="350" r="6" fill="green"/>
  <text x="340" y="365" font-size="13">Point B</text>

  <!-- Center -->
  <circle cx="250" cy="280" r="4" fill="#000"/>
  <text x="260" y="285" font-size="12">O</text>

  <!-- Radius lines -->
  <line x1="250" y1="280" x2="180" y2="210" stroke="#555" stroke-width="2"/>
  <line x1="250" y1="280" x2="330" y2="350" stroke="#555" stroke-width="2"/>

  <!-- Angle Arc -->
  <path d="M230 260 A40 40 0 0 1 290 310"
        fill="none"
        stroke="#ff9800"
        stroke-width="3"/>
  <text x="255" y="295" font-size="14" fill="#ff9800">θ</text>

  <!-- Great Circle Path -->
  <path d="M180 210 Q250 120 330 350"
        fill="none"
        stroke="#2e7d32"
        stroke-width="3"
        stroke-dasharray="6,4"/>

  <!-- Label -->
  <text x="250" y="120" text-anchor="middle" font-size="13" fill="#2e7d32">
    Great-circle distance
  </text>

  <!-- Mini circle diagram -->
  <circle cx="600" cy="200" r="80" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Mini angle -->
  <line x1="600" y1="200" x2="600" y2="120" stroke="#1976d2" stroke-width="2"/>
  <line x1="600" y1="200" x2="670" y2="200" stroke="#2e7d32" stroke-width="2"/>

  <path d="M600 160 A40 40 0 0 1 640 200"
        fill="none"
        stroke="#ff9800"
        stroke-width="2"/>

  <text x="620" y="175" font-size="14">θ</text>

  <!-- Formula -->
  <rect x="420" y="320" width="340" height="140" rx="19"
        fill="#ffffff" stroke="#ccc"/>

  <text x="580" y="355" text-anchor="middle" font-size="16">
    hav(θ) = sin²(θ/2)
  </text>

  <text x="580" y="385" text-anchor="middle" font-size="16">
    d = 2R · asin( √a )
  </text>

  <text x="580" y="420" text-anchor="middle" font-size="18" fill="#555">
    a = sin²(Δφ/2) + cosφ₁·cosφ₂·sin²(Δλ/2)
  </text>

</svg>