
<svg viewBox="0 0 360 260" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect width="100%" height="100%" fill="#f8fbff"/>

<!-- Title -->
<text x="180" y="25" text-anchor="middle" font-size="16" font-weight="bold">
Adding Fractions (LCM Method)
</text>

<!-- FRACTIONS -->
<!-- 2/3 -->
<text x="60" y="80" text-anchor="middle" font-size="26">2</text>
<line x1="40" y1="88" x2="80" y2="88" stroke="#000"/>
<text x="60" y="115" text-anchor="middle" font-size="26">3</text>

<!-- + -->
<text x="100" y="100" font-size="24">+</text>

<!-- 1/2 -->
<text x="140" y="80" text-anchor="middle" font-size="26">1</text>
<line x1="120" y1="88" x2="160" y2="88" stroke="#000"/>
<text x="140" y="115" text-anchor="middle" font-size="26">2</text>

<!-- + -->
<text x="180" y="100" font-size="24">+</text>

<!-- 3/4 -->
<text x="220" y="80" text-anchor="middle" font-size="26">3</text>
<line x1="200" y1="88" x2="240" y2="88" stroke="#000"/>
<text x="220" y="115" text-anchor="middle" font-size="26">4</text>

<!-- = -->
<text x="260" y="100" font-size="24">=</text>

<!-- RESULT -->
<text x="300" y="80" text-anchor="middle" font-size="22" fill="#dc3545">23</text>
<line x1="285" y1="88" x2="315" y2="88" stroke="#dc3545"/>
<text x="300" y="115" text-anchor="middle" font-size="22" fill="#dc3545">12</text>

<!-- LCM STEP -->
<text x="180" y="145" text-anchor="middle" font-size="13" fill="#555">
LCM(3,2,4) = 12 → Convert all fractions
</text>

<!-- PIE VISUALIZATION -->

<!-- 2/3 = 8/12 -->
<circle cx="80" cy="200" r="28" fill="#e9ecef"/>
<path d="M80 200 L80 172 A28 28 0 1 1 55 210 Z" fill="#0d6efd"/>
<text x="80" y="245" text-anchor="middle" font-size="11">8/12</text>

<!-- 1/2 = 6/12 -->
<circle cx="160" cy="200" r="28" fill="#e9ecef"/>
<path d="M160 200 L160 172 A28 28 0 0 1 160 228 Z" fill="#198754"/>
<text x="160" y="245" text-anchor="middle" font-size="11">6/12</text>

<!-- 3/4 = 9/12 -->
<circle cx="240" cy="200" r="28" fill="#e9ecef"/>
<path d="M240 200 L240 172 A28 28 0 1 1 212 200 Z" fill="#ffc107"/>
<text x="240" y="245" text-anchor="middle" font-size="11">9/12</text>



</svg>
